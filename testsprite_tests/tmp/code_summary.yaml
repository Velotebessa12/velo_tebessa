version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: Next.js 16 (App Router)
  - ui_library: Tailwind CSS v4, Radix UI, Lucide React
  - other: Prisma ORM, Zustand, i18next, JWT, Cloudinary, React Hot Toast

routes:
  - path: /en
    file: app/[lang]/(site)/page.tsx
    auth_required: false
    description: Home page / product listing
  - path: /en/login
    file: app/[lang]/(site)/login/page.tsx
    auth_required: false
    description: User login and sign-up page
  - path: /en/products
    file: app/[lang]/(site)/products/page.tsx
    auth_required: false
    description: All products listing page
  - path: /en/products/:id
    file: app/[lang]/(site)/products/[id]/page.tsx
    auth_required: false
    description: Product detail page
  - path: /en/categories
    file: app/[lang]/(site)/categories/page.tsx
    auth_required: false
    description: All categories listing
  - path: /en/categories/:category
    file: app/[lang]/(site)/categories/[category]/page.tsx
    auth_required: false
    description: Products filtered by category
  - path: /en/packs/:id
    file: app/[lang]/(site)/packs/[id]/page.tsx
    auth_required: false
    description: Pack detail page
  - path: /en/cart
    file: app/[lang]/(site)/cart/page.tsx
    auth_required: false
    description: Shopping cart page
  - path: /en/checkout
    file: app/[lang]/(site)/checkout/page.tsx
    auth_required: false
    description: Checkout / place order page
  - path: /en/favorites
    file: app/[lang]/(site)/favorites/page.tsx
    auth_required: false
    description: User favorites list
  - path: /en/orders
    file: app/[lang]/(site)/orders/page.tsx
    auth_required: true
    description: User order history
  - path: /en/orders/:id
    file: app/[lang]/(site)/orders/[id]/page.tsx
    auth_required: true
    description: Order detail for logged-in user
  - path: /en/orders/:id/edit
    file: app/[lang]/(site)/orders/[id]/edit/page.tsx
    auth_required: true
    description: Edit a pending order
  - path: /en/orders/:id/exchange
    file: app/[lang]/(site)/orders/[id]/exchange/page.tsx
    auth_required: true
    description: Request an exchange for an order
  - path: /en/orders/:id/return
    file: app/[lang]/(site)/orders/[id]/return/page.tsx
    auth_required: true
    description: Request a return for an order
  - path: /en/profile
    file: app/[lang]/(site)/profile/page.tsx
    auth_required: true
    description: User profile settings
  - path: /en/order-success
    file: app/[lang]/(site)/order-success/page.tsx
    auth_required: false
    description: Order placed successfully confirmation page
  - path: /en/order-failed
    file: app/[lang]/(site)/order-failed/page.tsx
    auth_required: false
    description: Order failed page
  - path: /en/thank-you
    file: app/[lang]/(site)/thank-you/page.tsx
    auth_required: false
    description: Thank you page after checkout
  - path: /en/socials
    file: app/[lang]/(site)/socials/page.tsx
    auth_required: false
    description: Social media links page
  - path: /en/admin
    file: app/[lang]/(admin)/admin/page.tsx
    auth_required: true
    description: Admin root (redirects to dashboard)
  - path: /en/admin/dashboard
    file: app/[lang]/(admin)/admin/(with)/dashboard/page.tsx
    auth_required: true
    description: Admin dashboard with stats
  - path: /en/admin/orders
    file: app/[lang]/(admin)/admin/(with)/orders/page.tsx
    auth_required: true
    description: Admin orders management
  - path: /en/admin/orders/:id
    file: app/[lang]/(admin)/admin/(with)/orders/[id]/page.tsx
    auth_required: true
    description: Admin order detail and status update
  - path: /en/admin/products
    file: app/[lang]/(admin)/admin/(with)/products/page.tsx
    auth_required: true
    description: Admin products list and management
  - path: /en/admin/products/new
    file: app/[lang]/(admin)/admin/(with)/products/new/page.tsx
    auth_required: true
    description: Create new product
  - path: /en/admin/products/import
    file: app/[lang]/(admin)/admin/(with)/products/import/page.tsx
    auth_required: true
    description: Import products via CSV
  - path: /en/admin/categories
    file: app/[lang]/(admin)/admin/(with)/categories/page.tsx
    auth_required: true
    description: Admin categories management
  - path: /en/admin/coupons
    file: app/[lang]/(admin)/admin/(with)/coupons/page.tsx
    auth_required: true
    description: Admin coupons management
  - path: /en/admin/discounts
    file: app/[lang]/(admin)/admin/(with)/discounts/page.tsx
    auth_required: true
    description: Admin discounts management
  - path: /en/admin/customers
    file: app/[lang]/(admin)/admin/(with)/customers/page.tsx
    auth_required: true
    description: Admin customers list
  - path: /en/admin/employees
    file: app/[lang]/(admin)/admin/(with)/employees/page.tsx
    auth_required: true
    description: Admin employees management
  - path: /en/admin/delivery
    file: app/[lang]/(admin)/admin/(with)/delivery/page.tsx
    auth_required: true
    description: Admin delivery management
  - path: /en/admin/delivery-persons
    file: app/[lang]/(admin)/admin/(with)/delivery-persons/page.tsx
    auth_required: true
    description: Admin delivery persons management
  - path: /en/admin/delivery-prices
    file: app/[lang]/(admin)/admin/(with)/delivery-prices/page.tsx
    auth_required: true
    description: Admin delivery pricing management
  - path: /en/admin/finances
    file: app/[lang]/(admin)/admin/(with)/finances/page.tsx
    auth_required: true
    description: Admin financial stats and reports
  - path: /en/admin/inventory
    file: app/[lang]/(admin)/admin/(with)/inventory/page.tsx
    auth_required: true
    description: Admin inventory management
  - path: /en/admin/invoices
    file: app/[lang]/(admin)/admin/(with)/invoices/page.tsx
    auth_required: true
    description: Admin invoices management
  - path: /en/admin/cash-register
    file: app/[lang]/(admin)/admin/(with)/cash-register/page.tsx
    auth_required: true
    description: Admin cash register transactions
  - path: /en/admin/exchanges-returns
    file: app/[lang]/(admin)/admin/(with)/exchanges-returns/page.tsx
    auth_required: true
    description: Admin exchanges and returns management
  - path: /en/admin/images
    file: app/[lang]/(admin)/admin/(with)/images/page.tsx
    auth_required: true
    description: Admin image library
  - path: /en/admin/packs/new
    file: app/[lang]/(admin)/admin/(with)/packs/new/page.tsx
    auth_required: true
    description: Create new product pack
  - path: /en/admin/additions/new
    file: app/[lang]/(admin)/admin/(with)/additions/new/page.tsx
    auth_required: true
    description: Create new product addition/variant
  - path: /en/admin/settings
    file: app/[lang]/(admin)/admin/(with)/settings/page.tsx
    auth_required: true
    description: Admin app settings

features:
  - name: User Login
    description: Login with phone/email and password credentials
    files:
      - app/[lang]/(site)/login/page.tsx
      - app/api/auth/login/route.ts
    entry_route: /en/login
    user_interactions:
      - Fill in phone or email input field
      - Fill in password input field
      - Click Login button to submit
      - See error message on invalid credentials
      - Redirect to home on success
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false

  - name: User Sign Up
    description: Register a new customer account
    files:
      - app/[lang]/(site)/login/page.tsx
      - app/api/auth/sign-up/route.ts
    entry_route: /en/login
    user_interactions:
      - Switch to sign-up form
      - Fill in name, phone, password fields
      - Click Sign Up button
      - See success or error message
    api_calls:
      - method: POST
        endpoint: /api/auth/sign-up
    auth_required: false

  - name: Browse Products
    description: Browse and filter all products
    files:
      - app/[lang]/(site)/products/page.tsx
      - app/api/products/get-products/route.ts
    entry_route: /en/products
    user_interactions:
      - View product grid
      - Filter by category or search
      - Click on a product to view details
    api_calls:
      - method: GET
        endpoint: /api/products/get-products
    auth_required: false

  - name: View Product Detail
    description: View full product information and add to cart
    files:
      - app/[lang]/(site)/products/[id]/page.tsx
      - app/api/products/get-product/route.ts
      - app/api/products/get-similar-products/route.ts
    entry_route: /en/products/:id
    user_interactions:
      - View product images, name, price, description
      - Select product options/variants
      - Click Add to Cart button
      - View similar products section
    api_calls:
      - method: GET
        endpoint: /api/products/get-product
      - method: GET
        endpoint: /api/products/get-similar-products
    auth_required: false

  - name: Shopping Cart
    description: Manage items in shopping cart
    files:
      - app/[lang]/(site)/cart/page.tsx
    entry_route: /en/cart
    user_interactions:
      - View cart items with quantities and prices
      - Increase or decrease item quantity
      - Remove item from cart
      - View total price
      - Click proceed to checkout
    api_calls: []
    auth_required: false

  - name: Checkout / Place Order
    description: Complete purchase and place an order
    files:
      - app/[lang]/(site)/checkout/page.tsx
      - app/api/orders/create-order/route.ts
      - app/api/coupons/redeem-coupon/route.ts
    entry_route: /en/checkout
    user_interactions:
      - Fill in delivery address and contact info
      - Select delivery method
      - Apply coupon code
      - Review order summary
      - Click Place Order button
      - Redirect to order-success or order-failed page
    api_calls:
      - method: POST
        endpoint: /api/orders/create-order
      - method: POST
        endpoint: /api/coupons/redeem-coupon
    auth_required: false

  - name: Browse Categories
    description: Browse products by category
    files:
      - app/[lang]/(site)/categories/page.tsx
      - app/[lang]/(site)/categories/[category]/page.tsx
      - app/api/categories/get-categories/route.ts
    entry_route: /en/categories
    user_interactions:
      - View list of categories
      - Click on a category to filter products
      - View products within selected category
    api_calls:
      - method: GET
        endpoint: /api/categories/get-categories
    auth_required: false

  - name: Favorites
    description: Save and manage favorite products
    files:
      - app/[lang]/(site)/favorites/page.tsx
    entry_route: /en/favorites
    user_interactions:
      - View list of favorited products
      - Remove product from favorites
      - Click product to view detail
    api_calls: []
    auth_required: false

  - name: User Orders History
    description: View all past and current orders
    files:
      - app/[lang]/(site)/orders/page.tsx
      - app/api/orders/get-orders/route.ts
    entry_route: /en/orders
    user_interactions:
      - View list of orders with status
      - Click on order to view detail
      - Filter orders by status
    api_calls:
      - method: GET
        endpoint: /api/orders/get-orders
    auth_required: true

  - name: Order Detail (User)
    description: View detailed information for a specific order
    files:
      - app/[lang]/(site)/orders/[id]/page.tsx
      - app/api/orders/[id]/route.ts
    entry_route: /en/orders/:id
    user_interactions:
      - View order items, status, delivery info
      - Download order PDF
      - Navigate to edit, exchange, or return
    api_calls:
      - method: GET
        endpoint: /api/orders/:id
    auth_required: true

  - name: Request Exchange
    description: Submit an exchange request for an order
    files:
      - app/[lang]/(site)/orders/[id]/exchange/page.tsx
      - app/api/exchanges/create-exchange/route.ts
    entry_route: /en/orders/:id/exchange
    user_interactions:
      - Select items to exchange
      - Fill in exchange reason
      - Submit exchange request
    api_calls:
      - method: POST
        endpoint: /api/exchanges/create-exchange
    auth_required: true

  - name: Request Return
    description: Submit a return request for an order
    files:
      - app/[lang]/(site)/orders/[id]/return/page.tsx
      - app/api/returns/create-return/route.ts
    entry_route: /en/orders/:id/return
    user_interactions:
      - Select items to return
      - Fill in return reason
      - Submit return request
    api_calls:
      - method: POST
        endpoint: /api/returns/create-return
    auth_required: true

  - name: User Profile
    description: View and edit user profile information
    files:
      - app/[lang]/(site)/profile/page.tsx
      - app/api/users/[id]/route.ts
    entry_route: /en/profile
    user_interactions:
      - View profile name, phone, address
      - Edit profile fields
      - Save changes
    api_calls:
      - method: PUT
        endpoint: /api/users/:id
    auth_required: true

  - name: Admin Login
    description: Admin authentication
    files:
      - app/api/auth/admin/login/route.ts
    entry_route: /en/admin
    user_interactions:
      - Enter admin credentials
      - Submit login form
      - Redirect to admin dashboard on success
    api_calls:
      - method: POST
        endpoint: /api/auth/admin/login
    auth_required: false

  - name: Admin Dashboard
    description: View overall store statistics and KPIs
    files:
      - app/[lang]/(admin)/admin/(with)/dashboard/page.tsx
      - app/api/admin/get-stats/route.ts
    entry_route: /en/admin/dashboard
    user_interactions:
      - View sales stats, order counts, revenue
      - View charts and graphs
      - Navigate to different admin sections
    api_calls:
      - method: GET
        endpoint: /api/admin/get-stats
    auth_required: true

  - name: Admin Orders Management
    description: View, filter, and update order statuses
    files:
      - app/[lang]/(admin)/admin/(with)/orders/page.tsx
      - app/[lang]/(admin)/admin/(with)/orders/[id]/page.tsx
      - app/api/orders/get-orders/route.ts
      - app/api/orders/update-status/route.ts
    entry_route: /en/admin/orders
    user_interactions:
      - View paginated orders list
      - Filter orders by status or date
      - Click order to view full detail
      - Update order status (confirm, ship, deliver, cancel)
      - Print or download order PDF
    api_calls:
      - method: GET
        endpoint: /api/orders/get-orders
      - method: PATCH
        endpoint: /api/orders/update-status
      - method: GET
        endpoint: /api/orders/:id/pdf
    auth_required: true

  - name: Admin Products Management
    description: Create, edit, and delete products
    files:
      - app/[lang]/(admin)/admin/(with)/products/page.tsx
      - app/[lang]/(admin)/admin/(with)/products/new/page.tsx
      - app/api/products/get-products/route.ts
      - app/api/products/create-product/route.ts
      - app/api/products/[id]/route.ts
    entry_route: /en/admin/products
    user_interactions:
      - View products list with search and filter
      - Click New Product button
      - Fill in product name, price, category, images
      - Submit to create product
      - Edit or delete existing product
    api_calls:
      - method: GET
        endpoint: /api/products/get-products
      - method: POST
        endpoint: /api/products/create-product
      - method: PUT
        endpoint: /api/products/:id
      - method: DELETE
        endpoint: /api/products/:id
    auth_required: true

  - name: Admin Categories Management
    description: Create, edit, and delete product categories
    files:
      - app/[lang]/(admin)/admin/(with)/categories/page.tsx
      - app/api/categories/get-categories/route.ts
      - app/api/categories/create-category/route.ts
      - app/api/categories/[id]/route.ts
    entry_route: /en/admin/categories
    user_interactions:
      - View categories list
      - Create new category with name and image
      - Edit or delete existing category
    api_calls:
      - method: GET
        endpoint: /api/categories/get-categories
      - method: POST
        endpoint: /api/categories/create-category
      - method: PUT
        endpoint: /api/categories/:id
      - method: DELETE
        endpoint: /api/categories/:id
    auth_required: true

  - name: Admin Coupons Management
    description: Create and manage discount coupons
    files:
      - app/[lang]/(admin)/admin/(with)/coupons/page.tsx
      - app/api/coupons/get-coupons/route.ts
      - app/api/coupons/create-coupon/route.ts
      - app/api/coupons/[id]/route.ts
    entry_route: /en/admin/coupons
    user_interactions:
      - View coupons list
      - Create new coupon with code, discount value, expiry
      - Delete or deactivate coupon
    api_calls:
      - method: GET
        endpoint: /api/coupons/get-coupons
      - method: POST
        endpoint: /api/coupons/create-coupon
      - method: DELETE
        endpoint: /api/coupons/:id
    auth_required: true

  - name: Admin Customers Management
    description: View and manage customer accounts
    files:
      - app/[lang]/(admin)/admin/(with)/customers/page.tsx
      - app/api/users/get-customers/route.ts
      - app/api/users/[id]/route.ts
    entry_route: /en/admin/customers
    user_interactions:
      - View customers list with search
      - View customer order history
      - Edit or delete customer account
    api_calls:
      - method: GET
        endpoint: /api/users/get-customers
    auth_required: true

  - name: Admin Inventory Management
    description: Track and manage product stock levels
    files:
      - app/[lang]/(admin)/admin/(with)/inventory/page.tsx
      - app/api/inventory/get-operations/route.ts
      - app/api/inventory/create-operation/route.ts
      - app/api/inventory/get-stats/route.ts
    entry_route: /en/admin/inventory
    user_interactions:
      - View inventory stats
      - View stock operations history
      - Create new stock-in or stock-out operation
    api_calls:
      - method: GET
        endpoint: /api/inventory/get-stats
      - method: GET
        endpoint: /api/inventory/get-operations
      - method: POST
        endpoint: /api/inventory/create-operation
    auth_required: true

  - name: Admin Finances
    description: View financial statistics and reports
    files:
      - app/[lang]/(admin)/admin/(with)/finances/page.tsx
      - app/api/finances/get-stats/route.ts
    entry_route: /en/admin/finances
    user_interactions:
      - View revenue, expenses, profit charts
      - Filter by date range
    api_calls:
      - method: GET
        endpoint: /api/finances/get-stats
    auth_required: true

  - name: Admin Cash Register
    description: Record and track cash transactions
    files:
      - app/[lang]/(admin)/admin/(with)/cash-register/page.tsx
      - app/api/cash-register/get-transactions/route.ts
      - app/api/cash-register/create-transaction/route.ts
      - app/api/cash-register/get-stats/route.ts
    entry_route: /en/admin/cash-register
    user_interactions:
      - View transaction history
      - Add new cash-in or cash-out transaction
      - View cash balance stats
    api_calls:
      - method: GET
        endpoint: /api/cash-register/get-transactions
      - method: POST
        endpoint: /api/cash-register/create-transaction
      - method: GET
        endpoint: /api/cash-register/get-stats
    auth_required: true

  - name: Admin Delivery Management
    description: Manage delivery orders and agencies
    files:
      - app/[lang]/(admin)/admin/(with)/delivery/page.tsx
      - app/api/delivery/agencies/get-orders/route.ts
      - app/api/delivery/agencies/dhd-express/create-order/route.ts
      - app/api/delivery/agencies/noest-express/create-order/route.ts
    entry_route: /en/admin/delivery
    user_interactions:
      - View delivery orders list
      - Create delivery order with DHD Express or Noest Express
      - Sync delivery statuses
    api_calls:
      - method: GET
        endpoint: /api/delivery/agencies/get-orders
      - method: POST
        endpoint: /api/delivery/agencies/dhd-express/create-order
      - method: POST
        endpoint: /api/delivery/agencies/noest-express/create-order
      - method: POST
        endpoint: /api/delivery/agencies/orders/sync-status
    auth_required: true

  - name: Admin Exchanges and Returns
    description: View and process product exchanges and returns
    files:
      - app/[lang]/(admin)/admin/(with)/exchanges-returns/page.tsx
      - app/api/exchanges/get-exchanges/route.ts
      - app/api/returns/get-returns/route.ts
    entry_route: /en/admin/exchanges-returns
    user_interactions:
      - View pending exchanges and returns
      - Approve or reject exchange/return request
    api_calls:
      - method: GET
        endpoint: /api/exchanges/get-exchanges
      - method: GET
        endpoint: /api/returns/get-returns
    auth_required: true

  - name: Admin Invoices
    description: Create and manage invoices
    files:
      - app/[lang]/(admin)/admin/(with)/invoices/page.tsx
      - app/api/invoices/get-invoices/route.ts
      - app/api/invoices/create-invoice/route.ts
      - app/api/invoices/[id]/pdf/route.ts
    entry_route: /en/admin/invoices
    user_interactions:
      - View invoices list
      - Create new invoice
      - Download invoice PDF
    api_calls:
      - method: GET
        endpoint: /api/invoices/get-invoices
      - method: POST
        endpoint: /api/invoices/create-invoice
      - method: GET
        endpoint: /api/invoices/:id/pdf
    auth_required: true

known_limitations:
  - issue: App uses [lang] dynamic segment for i18n - all routes require a language prefix (e.g. /en/, /ar/)
    location: app/[lang]/layout.tsx
    impact: Tests must include the language prefix in all URLs
  - issue: Admin routes are protected by JWT stored in cookies - requires admin login before accessing admin pages
    location: app/[lang]/(admin)/admin/(with)/layout.tsx
    impact: Admin tests must first authenticate via /api/auth/admin/login
